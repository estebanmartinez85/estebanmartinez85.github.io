<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Blaster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #game-container canvas { display: block; }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
  // ─── Constants ────────────────────────────────────────────────────────────────
  const W = 480, H = 640;
  const COLORS = { player: 0x00e5ff, bullet: 0xffeb3b, enemy: 0xff1744, star: 0xffffff, explosion: 0xff6d00 };

  // ─── Utility: draw a simple polygon texture ────────────────────────────────
  function makeTexture(scene, key, drawFn, w, h) {
    if (scene.textures.exists(key)) return;
    const g = scene.make.graphics({ x: 0, y: 0, add: false });
    drawFn(g);
    g.generateTexture(key, w, h);
    g.destroy();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  BOOT SCENE – creates all procedural textures
  // ═══════════════════════════════════════════════════════════════════════════
  class BootScene extends Phaser.Scene {
    constructor() { super('Boot'); }

    create() {
      // Player ship (pointing up)
      makeTexture(this, 'player', g => {
        g.fillStyle(COLORS.player, 1);
        g.fillTriangle(20, 0, 0, 40, 40, 40);
        g.fillStyle(0xffffff, 0.8);
        g.fillRect(16, 28, 8, 10);
        g.fillStyle(0xff4081, 1);
        g.fillCircle(20, 36, 5);
      }, 40, 40);

      // Enemy ship (pointing down, more alien-looking)
      makeTexture(this, 'enemy', g => {
        g.fillStyle(COLORS.enemy, 1);
        g.fillTriangle(18, 40, 0, 10, 36, 10);
        g.fillRect(6, 12, 24, 8);
        g.fillStyle(0xff8a80, 1);
        g.fillCircle(18, 16, 5);
      }, 36, 40);

      // Bullet
      makeTexture(this, 'bullet', g => {
        g.fillStyle(COLORS.bullet, 1);
        g.fillRect(0, 0, 4, 14);
        g.fillStyle(0xffffff, 0.6);
        g.fillRect(1, 0, 2, 6);
      }, 4, 14);

      // Enemy bullet
      makeTexture(this, 'ebullet', g => {
        g.fillStyle(0xff80ab, 1);
        g.fillRect(0, 0, 4, 12);
      }, 4, 12);

      // Explosion particle
      makeTexture(this, 'particle', g => {
        g.fillStyle(COLORS.explosion, 1);
        g.fillCircle(4, 4, 4);
      }, 8, 8);

      // Star
      makeTexture(this, 'star', g => {
        g.fillStyle(COLORS.star, 1);
        g.fillRect(0, 0, 2, 2);
      }, 2, 2);

      this.scene.start('Game');
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  GAME SCENE
  // ═══════════════════════════════════════════════════════════════════════════
  class GameScene extends Phaser.Scene {
    constructor() { super('Game'); }

    init() {
      this.score = 0;
      this.lives = 3;
      this.wave  = 1;
      this.gameOver = false;
    }

    create() {
      // Starfield background
      this.stars = [];
      for (let i = 0; i < 120; i++) {
        const s = this.add.image(
          Phaser.Math.Between(0, W),
          Phaser.Math.Between(0, H),
          'star'
        );
        s.setAlpha(Phaser.Math.FloatBetween(0.3, 1));
        s.speed = Phaser.Math.FloatBetween(0.5, 2.5);
        this.stars.push(s);
      }

      // Groups
      this.bullets  = this.physics.add.group();
      this.enemies  = this.physics.add.group();
      this.eBullets = this.physics.add.group();

      // Player
      this.player = this.physics.add.image(W / 2, H - 70, 'player')
        .setCollideWorldBounds(true);

      // Controls
      this.cursors = this.input.keyboard.createCursorKeys();
      this.fireKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
      this.wasd    = this.input.keyboard.addKeys({ left: 'A', right: 'D', up: 'W', down: 'S' });

      // Touch / pointer drag
      this.input.on('pointermove', p => {
        if (p.isDown) this.player.x = Phaser.Math.Clamp(p.x, 20, W - 20);
      });
      this.input.on('pointerdown', p => {
        if (p.y > H * 0.6) this.fireBullet();   // tap bottom half to shoot
      });

      // HUD
      const hudStyle = { font: '18px Courier New', fill: '#00e5ff' };
      this.scoreTxt = this.add.text(10, 10, 'SCORE: 0', hudStyle);
      this.livesTxt = this.add.text(10, 34, 'LIVES: ♥♥♥', hudStyle);
      this.waveTxt  = this.add.text(W - 10, 10, 'WAVE 1', { ...hudStyle, fill: '#ff1744' })
        .setOrigin(1, 0);

      // Overlaps
      this.physics.add.overlap(this.bullets,  this.enemies,  this.hitEnemy,  null, this);
      this.physics.add.overlap(this.eBullets, this.player,   this.hitPlayer, null, this);
      this.physics.add.overlap(this.enemies,  this.player,   this.hitPlayer, null, this);

      // Timers
      this.fireTimer  = 0;
      this.spawnTimer = 0;
      this.eFireTimer = 0;

      // Spawn first wave
      this.spawnWave();
    }

    // ── Spawning ──────────────────────────────────────────────────────────────
    spawnWave() {
      const cols  = Math.min(4 + this.wave, 8);
      const rows  = Math.min(1 + Math.floor(this.wave / 2), 4);
      const xGap  = (W - 60) / cols;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const e = this.enemies.create(40 + c * xGap, 60 + r * 50, 'enemy');
          e.setVelocity(
            (this.wave % 2 === 0 ? -1 : 1) * (40 + this.wave * 5),
            0
          );
          e.hp = 1 + Math.floor(this.wave / 3);
          e.setBounce(0);
        }
      }
      this.waveTxt.setText(`WAVE ${this.wave}`);
    }

    // ── Player fire ───────────────────────────────────────────────────────────
    fireBullet() {
      const b = this.bullets.create(this.player.x, this.player.y - 25, 'bullet');
      b.setVelocityY(-520);
      b.body.setAllowGravity(false);
      this.time.delayedCall(1800, () => { if (b.active) b.destroy(); });
    }

    // ── Enemy fire ────────────────────────────────────────────────────────────
    enemyFire() {
      const alive = this.enemies.getChildren().filter(e => e.active);
      if (alive.length === 0) return;
      const shooter = Phaser.Utils.Array.GetRandom(alive);
      const b = this.eBullets.create(shooter.x, shooter.y + 20, 'ebullet');
      b.setVelocityY(180 + this.wave * 15);
      b.body.setAllowGravity(false);
      this.time.delayedCall(3000, () => { if (b.active) b.destroy(); });
    }

    // ── Collision: bullet hits enemy ──────────────────────────────────────────
    hitEnemy(bullet, enemy) {
      bullet.destroy();
      enemy.hp -= 1;
      this.cameras.main.shake(40, 0.004);

      if (enemy.hp <= 0) {
        this.explode(enemy.x, enemy.y);
        enemy.destroy();
        this.score += 10 * this.wave;
        this.scoreTxt.setText(`SCORE: ${this.score}`);
      } else {
        // Flash red
        this.tweens.add({ targets: enemy, alpha: 0.2, duration: 80, yoyo: true });
      }
    }

    // ── Collision: enemy / eBullet hits player ────────────────────────────────
    hitPlayer(obj1, obj2) {
      // obj1 is eBullets/enemies, obj2 might be player or vice‑versa
      const enemy  = obj1 === this.player ? obj2 : obj1;
      if (!this.player.active) return;

      if (enemy.active) enemy.destroy();
      this.explode(this.player.x, this.player.y);

      this.lives -= 1;
      this.livesTxt.setText(`LIVES: ${'♥'.repeat(Math.max(this.lives, 0))}${'♡'.repeat(Math.max(3 - this.lives, 0))}`);

      if (this.lives <= 0) {
        this.endGame();
        return;
      }

      // Brief invincibility
      this.player.setAlpha(0.3);
      this.time.delayedCall(1500, () => { if (this.player.active) this.player.setAlpha(1); });
    }

    // ── Explosion particles ───────────────────────────────────────────────────
    explode(x, y) {
      for (let i = 0; i < 14; i++) {
        const p = this.add.image(x, y, 'particle');
        const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
        const speed = Phaser.Math.FloatBetween(40, 160);
        this.tweens.add({
          targets: p,
          x: x + Math.cos(angle) * speed,
          y: y + Math.sin(angle) * speed,
          alpha: 0,
          scaleX: 0, scaleY: 0,
          duration: Phaser.Math.Between(300, 700),
          onComplete: () => p.destroy()
        });
      }
    }

    // ── Game over ─────────────────────────────────────────────────────────────
    endGame() {
      this.gameOver = true;
      this.player.setActive(false).setVisible(false);
      this.physics.pause();

      this.add.rectangle(W / 2, H / 2, 300, 180, 0x000000, 0.8).setDepth(10);
      this.add.text(W / 2, H / 2 - 50, 'GAME OVER', { font: 'bold 32px Courier New', fill: '#ff1744' })
        .setOrigin(0.5).setDepth(11);
      this.add.text(W / 2, H / 2, `SCORE: ${this.score}`, { font: '20px Courier New', fill: '#00e5ff' })
        .setOrigin(0.5).setDepth(11);
      const restart = this.add.text(W / 2, H / 2 + 50, '[ PRESS R TO RESTART ]', { font: '16px Courier New', fill: '#ffeb3b' })
        .setOrigin(0.5).setDepth(11).setInteractive({ useHandCursor: true });

      this.tweens.add({ targets: restart, alpha: 0, duration: 600, yoyo: true, repeat: -1 });
      this.input.keyboard.once('keydown-R', () => this.scene.restart());
      restart.on('pointerdown', () => this.scene.restart());
    }

    // ── Main update ───────────────────────────────────────────────────────────
    update(time, delta) {
      if (this.gameOver) return;

      // Scroll stars
      this.stars.forEach(s => {
        s.y += s.speed;
        if (s.y > H) { s.y = 0; s.x = Phaser.Math.Between(0, W); }
      });

      // Player movement
      const speed = 260;
      const left  = this.cursors.left.isDown  || this.wasd.left.isDown;
      const right = this.cursors.right.isDown || this.wasd.right.isDown;
      const up    = this.cursors.up.isDown    || this.wasd.up.isDown;
      const down  = this.cursors.down.isDown  || this.wasd.down.isDown;

      this.player.setVelocityX(right ? speed : left ? -speed : 0);
      this.player.setVelocityY(up ? -speed * 0.7 : down ? speed * 0.7 : 0);

      // Player fire
      this.fireTimer += delta;
      if (this.fireKey.isDown && this.fireTimer > 220) {
        this.fireTimer = 0;
        this.fireBullet();
      }

      // Enemy fire
      this.eFireTimer += delta;
      const fireInterval = Math.max(800 - this.wave * 50, 300);
      if (this.eFireTimer > fireInterval) {
        this.eFireTimer = 0;
        this.enemyFire();
      }

      // Enemy boundary bounce
      this.enemies.getChildren().forEach(e => {
        if (e.x < 20 || e.x > W - 20) {
          e.setVelocityX(-e.body.velocity.x);
          e.y += 20;
        }
        // Enemy reached bottom → player dies
        if (e.y > H - 60) {
          this.hitPlayer(e, this.player);
        }
      });

      // Next wave
      if (this.enemies.countActive() === 0 && this.bullets.countActive() === 0) {
        this.wave++;
        this.time.delayedCall(600, () => this.spawnWave());
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  PHASER CONFIG
  // ═══════════════════════════════════════════════════════════════════════════
  new Phaser.Game({
    type: Phaser.AUTO,
    width:  W,
    height: H,
    parent: 'game-container',
    backgroundColor: '#020010',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: [BootScene, GameScene]
  });
  </script>
</body>
</html>
